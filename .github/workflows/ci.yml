name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint backend and frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.12
      - uses: actions/setup-node@v5
        with:
          node-version: 20
      - uses: ./.github/actions/python-deps
      - uses: ./.github/actions/frontend-install
      - run: python -m pre_commit run --all-files
      - run: python -m compileall .

  test:
    name: Run unit tests
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python: [3.12]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: ./.github/actions/python-deps
      - run: python -m pytest -q -m 'not integration'

  docker-build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/docker-build

  integration:
    name: Run integration tests
    runs-on: ubuntu-latest
    needs: test
    services:
      db:
        image: postgres:15-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: iris_test
        options: >
          --health-cmd="pg_isready -U postgres -d iris_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      IRIS_DB_DSN: postgresql://postgres:postgres@localhost:5432/iris_test
      TEST_DB_DSN: postgresql://postgres:postgres@localhost:5432/iris_test
      IRIS_STORAGE_ROOT: /tmp/iris_test_storage
      IRIS_SECRET_KEY: iris-secret-key-change-in-production
      IRIS_LOG_LEVEL: INFO
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.12
      - uses: ./.github/actions/python-deps
      - name: Wait for postgres
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 -U postgres -d iris_test && break
            sleep 2
          done
      - run: python -m db.migrations_runner
      - run: python -m pytest -q -m integration
